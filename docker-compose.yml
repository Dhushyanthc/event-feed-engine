services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_ENV: docker
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8081:8080"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: